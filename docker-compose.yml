services:

  # ── Datenbank ─────────────────────────────────────────────────────────────────
  # Für externe Datenbank: postgres-Service hier entfernen und DB_HOST in .env setzen.
  postgres:
    image: postgres:17-alpine
    container_name: ${CONTAINER_DB:-feuerwehrhub-db}
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${DB_NAME:-feuerwehrhub}
      POSTGRES_USER:     ${DB_USER:-feuerwehrhub}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-feuerwehrhub} -d ${DB_NAME:-feuerwehrhub}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - ff-net

  # ── Backend ───────────────────────────────────────────────────────────────────
  backend:
    image: ghcr.io/xpatrick096/feuerwehrhub-backend:latest
    container_name: ${CONTAINER_BACKEND:-feuerwehrhub-backend}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_HOST:              ${DB_HOST:-postgres}
      DB_PORT:              ${DB_PORT:-5432}
      DB_NAME:              ${DB_NAME:-feuerwehrhub}
      DB_USER:              ${DB_USER:-feuerwehrhub}
      DB_PASSWORD:          ${DB_PASSWORD}
      APP_HOST:             ${APP_HOST:-0.0.0.0}
      APP_PORT:             ${APP_PORT:-3000}
      JWT_SECRET:           ${JWT_SECRET}
      JWT_EXPIRY_HOURS:     ${JWT_EXPIRY_HOURS:-8}
      FF_NAME:              ${FF_NAME:-Freiwillige Feuerwehr}
      DATA_DIR:             /data
      FRONTEND_URL:         ${FRONTEND_URL:-http://localhost:8080}
      LOGIN_MAX_ATTEMPTS:   ${LOGIN_MAX_ATTEMPTS:-5}
      LOCKOUT_MINUTES:      ${LOCKOUT_MINUTES:-15}
      CONTAINER_BACKEND:    ${CONTAINER_BACKEND:-feuerwehrhub-backend}
      CONTAINER_FRONTEND:   ${CONTAINER_FRONTEND:-feuerwehrhub-frontend}
      CONTAINER_DB:         ${CONTAINER_DB:-feuerwehrhub-db}
    volumes:
      - ff-data:/data
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "${APP_PORT:-3000}:3000"
    networks:
      - ff-net
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # ── Frontend ──────────────────────────────────────────────────────────────────
  frontend:
    image: ghcr.io/xpatrick096/feuerwehrhub-frontend:latest
    container_name: ${CONTAINER_FRONTEND:-feuerwehrhub-frontend}
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - backend
    networks:
      - ff-net

networks:
  ff-net:
    driver: bridge

volumes:
  ff-data:
  pg-data:
