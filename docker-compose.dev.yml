# ── Entwicklungs-Overrides ────────────────────────────────────────────────────
#
# Dieses File überschreibt docker-compose.yml für lokale Entwicklung.
# Statt der fertigen GHCR-Images wird lokal gebaut.
#
# Verwendung:
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up -d --build
#
# ──────────────────────────────────────────────────────────────────────────────

services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
